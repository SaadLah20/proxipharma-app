# Legacy : plus d’enqueue SMS métier depuis 20260811_001 — ne traite que d’anciennes lignes pending.
# WhatsApp + e-mail : send-external-emails-cron.yml (§ RUNBOOK §9).
name: Send External SMS Cron

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  trigger-sms-cron:
    runs-on: ubuntu-latest
    steps:
      - name: Call production SMS cron endpoint
        env:
          APP_BASE_URL: ${{ secrets.APP_BASE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$APP_BASE_URL" ]; then
            echo "Missing GitHub secret: APP_BASE_URL"
            exit 1
          fi

          if [ -z "$CRON_SECRET" ]; then
            echo "Missing GitHub secret: CRON_SECRET"
            exit 1
          fi

          URL="${APP_BASE_URL%/}/api/cron/send-external-sms"
          echo "Calling $URL"
          http_code=$(curl -sS -o response.json -w "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer $CRON_SECRET" \
            "$URL")
          echo "HTTP $http_code"
          cat response.json
          echo
          if [ "$http_code" -lt 200 ] || [ "$http_code" -ge 300 ]; then
            exit 1
          fi
