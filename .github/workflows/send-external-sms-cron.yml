# SMS hors-app : déclenchement MANUEL uniquement (évite retries facturés toutes les 5 min).
# Prérequis : TWILIO_* sur Vercel + même expéditeur que Supabase Auth OTP si possible.
# Test : Actions → Run workflow, après une ligne pending dans notification_external_queue (channel=sms).
name: Send External SMS Cron (manual)

on:
  workflow_dispatch:

jobs:
  trigger-sms-cron:
    runs-on: ubuntu-latest
    steps:
      - name: Call production SMS cron endpoint
        env:
          APP_BASE_URL: ${{ secrets.APP_BASE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$APP_BASE_URL" ]; then
            echo "Missing GitHub secret: APP_BASE_URL"
            exit 1
          fi

          if [ -z "$CRON_SECRET" ]; then
            echo "Missing GitHub secret: CRON_SECRET"
            exit 1
          fi

          URL="${APP_BASE_URL%/}/api/cron/send-external-sms"
          echo "Calling $URL"
          http_code=$(curl -sS -o response.json -w "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer $CRON_SECRET" \
            "$URL")
          echo "HTTP $http_code"
          cat response.json
          echo
          if [ "$http_code" -lt 200 ] || [ "$http_code" -ge 300 ]; then
            exit 1
          fi
