# Les jobs `schedule` ne tournent que depuis la branche par défaut du dépôt (souvent `main`).
# Tant que ce fichier n’est pas fusionné dans `main`, le cron ne se déclenchera pas automatiquement.
# Test manuel : onglet Actions → ce workflow → « Run workflow » (workflow_dispatch).
name: Send External Emails Cron

on:
  schedule:
    # GitHub Actions schedule minimum cadence is every 5 minutes.
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  trigger-email-cron-endpoint:
    runs-on: ubuntu-latest
    steps:
      - name: Call production email cron endpoint
        env:
          APP_BASE_URL: ${{ secrets.APP_BASE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$APP_BASE_URL" ]; then
            echo "Missing GitHub secret: APP_BASE_URL"
            exit 1
          fi

          if [ -z "$CRON_SECRET" ]; then
            echo "Missing GitHub secret: CRON_SECRET"
            exit 1
          fi

          URL="${APP_BASE_URL%/}/api/cron/send-external-emails"
          echo "Calling $URL"

          http_code=$(curl -sS -o response.json -w "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer $CRON_SECRET" \
            "$URL")

          echo "HTTP $http_code"
          cat response.json
          echo

          if [ "$http_code" -lt 200 ] || [ "$http_code" -ge 300 ]; then
            exit 1
          fi

